<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Network Security Monitor</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0a0a0f;
      --surface:  #111118;
      --border:   #1e1e2e;
      --text:     #cdd6f4;
      --dim:      #585b70;
      --green:    #a6e3a1;
      --red:      #f38ba8;
      --blue:     #89b4fa;
      --yellow:   #f9e2af;
      --cyan:     #89dceb;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Courier New', Courier, monospace;
      font-size: 13px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── header ─────────────────────────────────────────────── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 10px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }

    .logo {
      font-size: 15px;
      letter-spacing: 3px;
      color: var(--green);
      font-weight: bold;
    }

    .stats {
      display: flex;
      gap: 28px;
    }

    .stat { text-align: center; }
    .stat-val  { font-size: 22px; font-weight: bold; line-height: 1; }
    .stat-label { font-size: 10px; color: var(--dim); letter-spacing: 1px; margin-top: 2px; }

    .v-red  { color: var(--red);  }
    .v-blue { color: var(--blue); }
    .v-all  { color: var(--green);}

    /* ── status bar ─────────────────────────────────────────── */
    .status-bar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 4px 20px;
      font-size: 11px;
      color: var(--dim);
      display: flex;
      gap: 16px;
      flex-shrink: 0;
    }

    .dot {
      display: inline-block;
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--green);
      margin-right: 5px;
      vertical-align: middle;
      animation: pulse 1.4s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.25; }
    }

    /* ── feed ───────────────────────────────────────────────── */
    #feed {
      flex: 1;
      overflow-y: auto;
      padding: 10px 20px 20px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    /* newest event at top — achieved by reversing flex */
    #feed { flex-direction: column-reverse; }

    .event {
      border-left: 3px solid;
      background: var(--surface);
      padding: 8px 12px;
      animation: slideIn 0.25s ease;
    }

    .event.red  { border-color: var(--red);  }
    .event.blue { border-color: var(--blue); }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .ev-header {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
      margin-bottom: 5px;
    }

    .badge {
      padding: 1px 7px;
      border-radius: 3px;
      font-size: 10px;
      font-weight: bold;
      letter-spacing: 1px;
    }
    .badge.red  { background: var(--red);  color: #11111b; }
    .badge.blue { background: var(--blue); color: #11111b; }

    .ts       { color: var(--dim); font-size: 11px; }
    .attacker { color: var(--text); font-weight: bold; }
    .arrow    { color: var(--dim); }
    .target   { color: var(--yellow); }
    .ip       { color: var(--dim); font-size: 11px; }

    .ports {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }

    .port-tag {
      background: #1e1e2e;
      color: var(--cyan);
      padding: 1px 7px;
      border-radius: 3px;
      font-size: 11px;
    }

    .no-ports { color: var(--dim); font-size: 11px; font-style: italic; }

    /* ── empty state ─────────────────────────────────────────── */
    #empty {
      color: var(--dim);
      text-align: center;
      margin: auto;
      font-size: 13px;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>

<header>
  <div class="logo">[ NETWORK SECURITY MONITOR ]</div>
  <div class="stats">
    <div class="stat">
      <div class="stat-val v-red"  id="cnt-red">0</div>
      <div class="stat-label">RED ATTACKS</div>
    </div>
    <div class="stat">
      <div class="stat-val v-blue" id="cnt-blue">0</div>
      <div class="stat-label">BLUE ATTACKS</div>
    </div>
    <div class="stat">
      <div class="stat-val v-all"  id="cnt-total">0</div>
      <div class="stat-label">TOTAL EVENTS</div>
    </div>
  </div>
</header>

<div class="status-bar">
  <span><span class="dot" id="dot"></span><span id="conn-status">CONNECTING...</span></span>
  <span id="last-event">no events yet</span>
</div>

<div id="feed">
  <div id="empty">Waiting for events&hellip;</div>
</div>

<script>
  let redCount = 0, blueCount = 0;

  function fmt(iso) {
    return new Date(iso).toLocaleTimeString([], { hour12: false });
  }

  function renderEvent(e) {
    const empty = document.getElementById("empty");
    if (empty) empty.remove();

    const feed = document.getElementById("feed");
    const div  = document.createElement("div");
    div.className = `event ${e.attacker_team}`;

    const ports = (e.open_ports || []);
    const portsHtml = ports.length
      ? ports.map(p => `<span class="port-tag">${escHtml(p)}</span>`).join("")
      : `<span class="no-ports">no open ports found</span>`;

    div.innerHTML = `
      <div class="ev-header">
        <span class="badge ${e.attacker_team}">${e.attacker_team.toUpperCase()}</span>
        <span class="ts">${fmt(e.timestamp)}</span>
        <span class="attacker">${escHtml(e.attacker_team)}.${escHtml(e.attacker_computer)}</span>
        <span class="arrow">──▶</span>
        <span class="target">${escHtml(e.target_team)}.${escHtml(e.target_computer)}</span>
        <span class="ip">(${escHtml(e.target_ip)})</span>
      </div>
      <div class="ports">${portsHtml}</div>
    `;

    // prepend = newest on top (feed is column-reverse so append = visual top)
    feed.appendChild(div);

    // Trim to 60 visible events
    while (feed.children.length > 60) feed.removeChild(feed.firstChild);

    if (e.attacker_team === "red") redCount++;
    else blueCount++;

    document.getElementById("cnt-red").textContent   = redCount;
    document.getElementById("cnt-blue").textContent  = blueCount;
    document.getElementById("cnt-total").textContent = redCount + blueCount;
    document.getElementById("last-event").textContent =
      `last event: ${fmt(e.timestamp)} — ${e.attacker_team}.${e.attacker_computer} → ${e.target_team}.${e.target_computer}`;
  }

  function escHtml(str) {
    return String(str)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;");
  }

  // Load existing history on page open
  fetch("/history")
    .then(r => r.json())
    .then(events => events.forEach(renderEvent))
    .catch(() => {});

  // SSE live stream
  function connect() {
    const dot    = document.getElementById("dot");
    const status = document.getElementById("conn-status");
    const es     = new EventSource("/stream");

    es.onopen = () => {
      dot.style.background = "var(--green)";
      status.textContent   = "LIVE";
    };

    es.onmessage = (ev) => {
      const data = JSON.parse(ev.data);
      if (!data.ping) renderEvent(data);
    };

    es.onerror = () => {
      dot.style.background = "var(--red)";
      status.textContent   = "RECONNECTING...";
      es.close();
      setTimeout(connect, 3000);
    };
  }

  connect();
</script>
</body>
</html>
